<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="stylesheet icon" href="./assets/logo.png">
    <!-- tailwind + daisy ui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- tailwind + daisy ui end   -->

    <!-- fonts google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- fonts google font end   -->

    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font awesome cdn end -->

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class="logo max-w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log
                    Out</a>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="buttons grid grid-cols-3 gap-3 justify-between">
            <!-- button 1  -->
            <button onclick="showOnly('add-money-section')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <!-- button 1 end  -->

            <!-- button 2  -->
            <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <!-- button 2 end  -->

            <!-- button 3  -->
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <!-- button 3 end  -->


            <!-- button 4  -->
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <!-- button 4 end  -->


            <!-- button 5  -->
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <!-- button 5 end  -->


            <!-- button 6  -->
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
            <!-- button 6 end  -->
        </div>
    </section>

    <section id="add-money-section" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold">Add Money</h2>
        <div class="form mx-auto mt-3">
            <div class="card bg-base-100 w-full shrink-0 shadow-xl rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label for="add-money-bank" class="label text-neutral font-bold">Select Bank</label>
                        <select id="add-money-bank" class="select w-full rounded-full bg-base-200">
                            <option disabled selected>Select a Bank</option>
                            <option>City Bank</option>
                            <option>IBBL</option>
                            <option>DBBL</option>
                        </select>
                        <br>
                        <label class="label text-neutral font-bold" for="">Select Account Number</label>
                        <input id="add-money-account-number" type="number" name=""
                            class="input w-full rounded-full bg-base-200" placeholder="Enter Bank 11 digit Number" />



                        <!-- amount to add   -->
                        <label class="label text-neutral font-bold">Amount to Add</label>
                        <input id="add-money-amount" type="number" class="input w-full rounded-full bg-base-200"
                            placeholder="Enter Amount to Add" />
                        <br>
                        <!-- amount to add end  -->


                        <label class="label text-neutral font-bold">4 Digit Pin</label>
                        <input id="add-money-pin" maxlength="4" minlength="4" type="password"
                            class="input w-full rounded-full bg-base-200" placeholder="Enter 4 digit pin" />
                        <div></div>
                        <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold">Cashout</h2>
        <div class="form mx-auto mt-3">
            <div class="card bg-base-100 w-full shrink-0 shadow-xl rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">

                        <!-- agent number  -->
                        <label class="label text-neutral font-bold">Agent Number</label>
                        <input id="cashout-number" minlength="11" maxlength="11" type="text"
                            class="input w-full rounded-full bg-base-200" placeholder="Enter Agent 11 digit Number"
                            value="01234567890" />
                        <br>
                        <!-- agent number end  -->


                        <!-- amount number  -->
                        <label class="label text-neutral font-bold">Amount</label>
                        <input id="cashout-amount" minlength="11" maxlength="11" type="number"
                            class="input w-full rounded-full bg-base-200" placeholder="Enter Amount for withdraw" />
                        <br>
                        <!-- amount number end  -->

                        <label class="label text-neutral font-bold">4 Digit Pin</label>
                        <input id="cashout-pin" maxlength="4" minlength="4" type="password"
                            class="input w-full rounded-full bg-base-200" placeholder="Enter 4 digit pin" />
                        <div></div>
                        <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">WithDraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="./script/machine.js"></script>
    <script src="./script/addMoney.js"></script>
    <script src="./script/cashout.js"></script>

</body>

</html>
